yle: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"cd3e8ce9-799e-4fdb-9ce9-342a7aa2c7e7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --blue:#1B4FB8;\n    --blue-deep:#153B8C;\n    --pink:#F04EA6;\n    --pink-soft:#FBD4E7;\n    --cream:#F5EFE4;\n    --cream-2:#EDE5D4;\n    --gold:#E8B835;\n    --ink:#0E1B3D;\n    --white:#FFFDF8;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:\"Inter\",system-ui,sans-serif;-webkit-font-smoothing:antialiased}\n  .page{width:1280px;margin:0 auto;background:var(--cream);overflow:hidden}\n  h1,h2,h3,.display{font-family:\"Archivo Black\",\"Inter\",sans-serif;font-weight:900;letter-spacing:-.01em;line-height:.98}\n\n  /* --- NAV --- */\n  nav.top{display:flex;align-items:center;justify-content:space-between;padding:22px 56px;background:var(--cream)}\n  .brand{display:flex;align-items:center;gap:12px}\n  .brand-mark{width:54px;height:54px}\n  .brand-name{line-height:1}\n  .brand-name .sk{font-family:\"Archivo Black\",sans-serif;font-size:26px;color:var(--blue);letter-spacing:.02em}\n  .brand-name .tag{font-family:\"Archivo Black\",sans-serif;font-size:26px;color:var(--pink);letter-spacing:.02em}\n  .brand-name small{display:block;font-size:10px;letter-spacing:.32em;color:var(--ink);opacity:.55;margin-top:4px;font-weight:600}\n  .nav-links{display:flex;gap:44px;align-items:center}\n  .nav-links a{color:var(--ink);text-decoration:none;font-weight:600;font-size:16px;position:relative}\n  .nav-links a.active::after{content:\"\";position:absolute;left:0;right:0;bottom:-8px;height:3px;background:var(--pink);border-radius:2px}\n  .book-btn{background:var(--pink);color:#fff;border:none;padding:14px 26px;border-radius:999px;font-weight:800;letter-spacing:.14em;font-size:13px;cursor:pointer;box-shadow:0 6px 0 #b8387c;transition:transform .1s}\n  .book-btn:hover{transform:translateY(1px);box-shadow:0 5px 0 #b8387c}\n\n  /* --- HERO --- */\n  .hero{position:relative;margin:0 24px;border-radius:28px;background:var(--blue);color:#fff;overflow:hidden;min-height:560px;padding:56px 64px}\n  .hero::before{content:none}\n  .hero::after{content:\"\";position:absolute;bottom:-60px;right:-60px;width:220px;height:220px;background:rgba(255,255,255,.06);border-radius:50%}\n  .hero-grid{position:relative;display:grid;grid-template-columns:1.05fr 1fr;gap:40px;align-items:center;z-index:2}\n  .eyebrow{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.12);padding:8px 16px;border-radius:999px;font-size:12px;letter-spacing:.28em;font-weight:700;margin-bottom:24px;text-transform:uppercase}\n  .eyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}\n  .hero h1{font-size:76px;margin:0 0 20px;color:#fff}\n  .hero h1 .pk{color:var(--pink)}\n  .hero h1 .gd{color:var(--gold)}\n  .hero p.lede{font-size:19px;line-height:1.5;max-width:460px;margin:0 0 28px;opacity:.92;font-weight:400}\n  .bullets{list-style:none;padding:0;margin:0 0 36px;display:grid;gap:12px;max-width:380px}\n  .bullets li{display:flex;align-items:center;gap:14px;font-size:17px;font-weight:600}\n  .bullets li .chk{width:26px;height:26px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;flex-shrink:0}\n  .cta-row{display:flex;align-items:center;gap:24px}\n  .cta{background:var(--pink);color:#fff;border:none;padding:18px 32px;border-radius:999px;font-weight:800;letter-spacing:.14em;font-size:14px;cursor:pointer;box-shadow:0 7px 0 #b8387c}\n  .cta-meta{font-size:13px;opacity:.75;line-height:1.35}\n  .cta-meta b{display:block;font-size:15px;opacity:1;font-weight:700}\n\n  .hero-art{position:relative;height:460px}\n  .hero-art .blob{position:absolute;inset:0;display:block}\n\n  /* decorative dots */\n  .dots{position:absolute;z-index:1}\n  .dots circle{fill:var(--pink)}\n  .dots.left{left:-6px;top:52%}\n  .dots.right{right:30px;top:20%}\n\n  /* --- SECTION TITLES --- */\n  .section{padding:80px 56px 40px}\n  .sec-title{display:flex;align-items:baseline;gap:18px;margin-bottom:36px}\n  .sec-title h2{font-size:44px;margin:0}\n  .sec-title .num{font-family:\"Archivo Black\",sans-serif;color:var(--pink);font-size:18px;letter-spacing:.2em}\n  .sec-title .line{flex:1;height:2px;background:var(--ink);opacity:.12}\n\n  /* --- SERVICES --- */\n  .services-wrap{padding:40px 56px 40px;position:relative}\n  .services{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}\n  .svc{background:#fff;border-radius:22px;padding:28px 26px 30px;position:relative;border:2px solid var(--ink);box-shadow:8px 8px 0 var(--ink);transition:transform .15s}\n  .svc:hover{transform:translate(-2px,-2px);box-shadow:10px 10px 0 var(--ink)}\n  .svc .illus{height:170px;background:var(--cream-2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;overflow:hidden;position:relative}\n  .svc .tag-num{position:absolute;top:14px;right:14px;background:var(--pink);color:#fff;font-family:\"Archivo Black\";font-size:12px;padding:6px 10px;border-radius:999px;letter-spacing:.12em}\n  .svc h3{font-size:26px;margin:0 0 10px;color:var(--blue)}\n  .svc p{margin:0 0 18px;font-size:14.5px;line-height:1.55;color:var(--ink);opacity:.78}\n  .svc .price{display:flex;align-items:baseline;gap:6px;border-top:1.5px dashed rgba(14,27,61,.2);padding-top:16px}\n  .svc .price .from{font-size:11px;letter-spacing:.22em;color:var(--ink);opacity:.55;font-weight:700;text-transform:uppercase}\n  .svc .price .amt{font-family:\"Archivo Black\";font-size:30px;color:var(--ink)}\n  .svc .price .per{font-size:12px;color:var(--ink);opacity:.55;font-weight:600}\n  .svc .arrow{margin-left:auto;width:36px;height:36px;border-radius:50%;background:var(--blue);display:flex;align-items:center;jus
